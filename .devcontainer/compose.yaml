services:
    web:
        build: .
        container_name: apache_php
        environment:
            DB_HOST: db
            DB_DATABASE: sofit_gym
            DB_USERNAME: root
            DB_PASSWORD: ""
        ports:
            - "8080:80"
        volumes:
            - ../.:/var/www/html:Z
        depends_on:
            - db
    
    db:
        image: docker.io/library/mariadb:11.4
        container_name: mariadb_db
        restart: always
        environment:
            MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
            MARIADB_DATABASE: sofit_gym
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql:Z

volumes:
    db_data:
